spec-version: 0.36.0

name: myPackage
version: 0.1.0.0

flags:
  buildable:
    description: Make component buildable.
    default: false
    manual: true

dependencies:
- base

executables:
  myPackage:
    source-dirs: app
    main: Main.hs
    when:
    - condition: flag(buildable)
      then:
        buildable: true
      else:
        buildable: false
