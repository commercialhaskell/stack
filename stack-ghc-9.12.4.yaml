# This is an experimental project-level configuration, to see if Stack can be
# built with GHC 9.12.4.
snapshot: nightly-2026-07-12 # GHC 9.12.4
compiler-check: match-exact # Protect against RCs of GHC 9.12.5

extra-deps:
# nightly-2026-07-12 specifies Cabal-3.14.2.0
- Cabal-3.16.1.0@sha256:39873317ab895194547c3fd72c91cdb97c800a49b2656920854747ee466627ca,14459
- Cabal-syntax-3.16.1.0@sha256:17cf54d07d7aa65ea24ba4045912b8a8af065f10e429fd1811d43810b313c504,7778

docker:
  enable: false
  repo: quay.io/benz0li/ghc-musl:9.12.4

nix:
  # --nix on the command-line to enable.
  packages:
  - pkg-config
  - zlib

flags:
  stack:
    developer-mode: true
